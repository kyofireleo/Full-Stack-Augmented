<div class="container">
  <h1>Gestión de Inventarios</h1>

  <div class="filter-section">
    <form [formGroup]="filterForm" class="filter-form">
      <mat-form-field appearance="outline">
        <mat-label>ID</mat-label>
        <input matInput formControlName="id" type="number">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Fecha</mat-label>
        <input matInput formControlName="fecha" type="date">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Responsable</mat-label>
        <input matInput formControlName="responsable">
      </mat-form-field>

      <button mat-raised-button color="primary" (click)="buscar()">
        <mat-icon>search</mat-icon>
        Buscar
      </button>

      <button mat-raised-button color="accent" (click)="agregarInventario()">
        <mat-icon>add</mat-icon>
        Crear Inventario
      </button>
    </form>
  </div>

  <table mat-table [dataSource]="inventarios" class="inventarios-table">
    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let element">{{ element.id }}</td>
    </ng-container>

    <!-- Fecha Column -->
    <ng-container matColumnDef="fecha">
      <th mat-header-cell *matHeaderCellDef>Fecha</th>
      <td mat-cell *matCellDef="let element">{{ element.fecha | date:'medium' }}</td>
    </ng-container>

    <!-- Responsable Column -->
    <ng-container matColumnDef="responsable">
      <th mat-header-cell *matHeaderCellDef>Responsable</th>
      <td mat-cell *matCellDef="let element">{{ element.responsable }}</td>
    </ng-container>

    <!-- Acciones Column -->
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let element">
        <button 
          mat-icon-button 
          matTooltip="Abrir" 
          (click)="abrir(element.id)"
          class="open-btn">
          <mat-icon>folder_open</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
