<div class="container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isEditing ? 'Editar Inventario' : 'Crear Inventario' }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="inventarioForm">
        <div class="form-row">
          <mat-form-field appearance="outline" class="form-field full-width">
            <mat-label>Responsable</mat-label>
            <input matInput formControlName="responsable" maxlength="100">
            <mat-hint align="end">{{ inventarioForm.get('responsable')?.value?.length || 0 }}/100</mat-hint>
            <mat-error *ngIf="inventarioForm.get('responsable')?.hasError('required')">
              Responsable es requerido
            </mat-error>
          </mat-form-field>
        </div>
      </form>
      <div class="table-wrapper">
        <div class="table-section" *ngIf="loaded">
          <h3>Productos</h3>
          <table mat-table [dataSource]="productoInventarioList" class="productos-table">
            <!-- Código Column -->
            <ng-container matColumnDef="codigo">
              <th mat-header-cell *matHeaderCellDef>Código</th>
              <td mat-cell *matCellDef="let element">{{ element.codigo }}</td>
            </ng-container>

            <!-- Nombre Column -->
            <ng-container matColumnDef="nombre">
              <th mat-header-cell *matHeaderCellDef>Nombre</th>
              <td mat-cell *matCellDef="let element">{{ element.nombre }}</td>
            </ng-container>

            <!-- Existencia Actual Column -->
            <ng-container matColumnDef="existencia">
              <th mat-header-cell *matHeaderCellDef>Existencia Actual</th>
              <td mat-cell *matCellDef="let element">
                <input 
                  type="number" 
                  [(ngModel)]="element.existenciaActual"
                  [ngModelOptions]="{standalone: true}"
                  class="existencia-input">
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>
        </div>

        <div class="button-group">
          <button mat-raised-button (click)="cancelar()">
            Cancelar
          </button>
          <button mat-raised-button color="primary" (click)="guardar()">
            Guardar
          </button>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
