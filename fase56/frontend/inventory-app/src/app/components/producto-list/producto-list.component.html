<div class="container">
  <h1>Gestión de Productos</h1>

  <div class="filter-section">
    <form [formGroup]="filterForm" class="filter-form">
      <mat-form-field appearance="outline">
        <mat-label>Código</mat-label>
        <input matInput formControlName="codigo" type="number">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="nombre">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Marca</mat-label>
        <input matInput formControlName="marca">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Precio</mat-label>
        <input matInput formControlName="precio" type="number">
      </mat-form-field>

      <button mat-raised-button color="primary" (click)="buscar()">
        <mat-icon>search</mat-icon>
        Buscar
      </button>

      <button mat-raised-button color="accent" (click)="agregarProducto()">
        <mat-icon>add</mat-icon>
        Agregar Producto
      </button>
    </form>
  </div>

  <ng-container>
    <table mat-table [dataSource]="dataSource" class="productos-table">
      <!-- Código Column -->
      <ng-container matColumnDef="codigo">
        <th mat-header-cell *matHeaderCellDef>Código</th>
        <td mat-cell *matCellDef="let element">{{ element.codigo }}</td>
      </ng-container>

      <!-- Nombre Column -->
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let element">{{ element.nombre }}</td>
      </ng-container>

      <!-- Marca Column -->
      <ng-container matColumnDef="marca">
        <th mat-header-cell *matHeaderCellDef>Marca</th>
        <td mat-cell *matCellDef="let element">{{ element.marca }}</td>
      </ng-container>

      <!-- Precio Column -->
      <ng-container matColumnDef="precio">
        <th mat-header-cell *matHeaderCellDef>Precio</th>
        <td mat-cell *matCellDef="let element">{{ element.precio | currency }}</td>
      </ng-container>

      <!-- Acciones Column -->
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let element">
          <button 
            mat-icon-button 
            matTooltip="Editar" 
            (click)="editar(element.codigo)"
            class="edit-btn">
            <mat-icon>edit</mat-icon>
          </button>
          <button 
            mat-icon-button 
            matTooltip="Eliminar" 
            (click)="eliminar(element.codigo)"
            class="delete-btn">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator
      [length]="totalItems"
      [pageSize]="pageSize"
      [pageSizeOptions]="pageSizeOptions"
      showFirstLastButtons
      (page)="onPageChange($event)">
    </mat-paginator>
  </ng-container>

  <!-- <ng-template #loading> Cargando productos...</ng-template> -->
</div>
